<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blood Bank Dashboard</title>
  <link rel="stylesheet" href="style.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body class="dark-theme">

  <div class="background-blobs">
    <div class="blob red"></div>
    <div class="blob purple"></div>
    <div class="blob blue"></div>
  </div>

  <header>
    <div class="header-inner">
      <div class="header-title">
        <div class="chip"><span class="drop"></span> BDMS System</div>
        <h1>Blood Bank <span>Dashboard</span></h1>
      </div>
      <button id="theme-toggle" class="icon-btn">
        <span class="material-symbols-outlined" id="theme-icon">light_mode</span>
      </button>
    </div>
  </header>

  <div class="search-section">
    <div class="search-row">
      <div class="search-container">
        <span class="material-symbols-outlined search-icon">search</span>
        <input type="text" id="global-search" class="search-input" placeholder="Search donors, inventory, or camps...">
      </div>
      <div class="filter-wrapper">
        <button id="filter-toggle" class="icon-btn filter-toggle-btn">
          <span class="material-symbols-outlined">filter_list</span>
        </button>
        <div id="filter-dropdown" class="filter-dropdown">
          <button class="filter-btn" data-filter="A+">A+</button>
          <button class="filter-btn" data-filter="A-">A-</button>
          <button class="filter-btn" data-filter="B+">B+</button>
          <button class="filter-btn" data-filter="B-">B-</button>
          <button class="filter-btn" data-filter="AB+">AB+</button>
          <button class="filter-btn" data-filter="AB-">AB-</button>
          <button class="filter-btn" data-filter="O+">O+</button>
          <button class="filter-btn" data-filter="O-">O-</button>
        </div>
      </div>
    </div>
  </div>

  <div class="nav-container">
    <div class="glass-tabs">
      <button class="tab-btn active" data-index="0">
        <span class="material-symbols-outlined">person</span> Donors
      </button>
      <button class="tab-btn" data-index="1">
        <span class="material-symbols-outlined">bloodtype</span> Inventory
      </button>
      <button class="tab-btn" data-index="2">
        <span class="material-symbols-outlined">campaign</span> Camps
      </button>
    </div>
  </div>

  <main>
    <section id="section-donors" class="tab-section active">
      <div class="card-container" id="donors-container"></div>
    </section>

    <section id="section-inventory" class="tab-section">
      <div class="card-container" id="inventory-container"></div>
    </section>

    <section id="section-camps" class="tab-section">
      <div class="card-container" id="camps-container"></div>
    </section>
  </main>

  <button class="fab" id="fab-add">
    <span class="material-symbols-outlined">add</span>
  </button>

  <div class="modal-overlay" id="add-modal">
    <div class="glass-modal">
      <div class="modal-header">
        <h2 class="data-title" style="margin: 0;">Add Record</h2>
        <button class="icon-btn" id="close-modal" type="button" style="background: transparent; border: none; font-size: 24px; cursor: pointer; color: var(--text-primary);">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      
      <div class="record-type-selector">
        <button class="type-btn active" data-type="donor">Donor</button>
        <button class="type-btn" data-type="inventory">Inventory</button>
        <button class="type-btn" data-type="camp">Camp</button>
      </div>

      <form id="add-form">
        <div id="form-donor" class="form-section active">
          <input type="text" id="donor-name" class="form-input" placeholder="Donor Name (VARCHAR)" required>
          <input type="tel" id="donor-phone" class="form-input" placeholder="Phone Number (VARCHAR)" maxlength="15" required>
          <select id="donor-bg" class="form-input" required>
            <option value="" disabled selected>Select Blood Group</option>
            <option value="O+">O+</option><option value="O-">O-</option>
            <option value="A+">A+</option><option value="A-">A-</option>
            <option value="B+">B+</option><option value="B-">B-</option>
            <option value="AB+">AB+</option><option value="AB-">AB-</option>
          </select>
          <input type="number" id="donor-blood-id" class="form-input" placeholder="Blood ID (INT - Auto-Filled)" readonly required style="opacity: 0.7;">
        </div>

        <div id="form-inventory" class="form-section">
          <select id="inv-bg" class="form-input">
            <option value="" disabled selected>Select Blood Group (VARCHAR)</option>
            <option value="O+">O+</option><option value="O-">O-</option>
            <option value="A+">A+</option><option value="A-">A-</option>
            <option value="B+">B+</option><option value="B-">B-</option>
            <option value="AB+">AB+</option><option value="AB-">AB-</option>
          </select>
          <input type="number" id="inv-blood-id" class="form-input" placeholder="Blood ID (INT - Auto-Filled)" readonly style="opacity: 0.7;">
          <input type="number" id="inv-units" class="form-input" placeholder="Total Units (INT)" min="0">
        </div>

        <div id="form-camp" class="form-section">
          <input type="number" id="camp-donor-id" class="form-input" placeholder="Donor ID (INT - Foreign Key)" required>
          <input type="date" id="camp-date" class="form-input" style="color-scheme: dark;" required>
          <input type="number" id="camp-units" class="form-input" placeholder="Units Given (INT)" min="1" required>
        </div>

        <button type="submit" class="submit-btn">Save to Database</button>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="app.js"></script>
</body>
</html>
